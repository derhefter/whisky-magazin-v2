name: Auto-Generate Articles (DEAKTIVIERT)

# DEAKTIVIERT: Artikel-Generierung läuft über Windows Task Scheduler (Montag 07:00 Uhr)
# → python main.py --auto -n 2  (erstellt Entwürfe im Dashboard zur Freigabe)
#
# Dieser Workflow wurde ersetzt, weil:
# - Er Artikel direkt veröffentlicht (kein Draft-Workflow)
# - Er den Windows Task Scheduler dupliziert (→ Konflikte)
# - Er eine veraltete URL und Konfiguration hatte
#
# Manueller Trigger bleibt erhalten für Notfälle.

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Anzahl zu generierender Artikel'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  generate-and-deploy:
    name: Generate Articles & Build Site
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: OpenAI Key prüfen
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY ist nicht gesetzt!"
            exit 1
          fi
          echo "OpenAI Key gesetzt (${#OPENAI_API_KEY} Zeichen)."

      - name: config.json erstellen
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 - <<'EOF'
          import json, os
          config = {
            "site": {
              "name": "Whisky Magazin",
              "tagline": "Dein Guide fuer Whisky, Destillerien & Reisen",
              "base_url": "https://www.whisky-reise.com",
              "language": "de",
              "author": "Steffen & Elmar"
            },
            "openai": {
              "api_key": os.environ.get("OPENAI_API_KEY", ""),
              "model": "gpt-4o",
              "temperature": 0.7,
              "max_tokens": 16000
            },
            "affiliate_links": {
              "amazon_tag": "whiskyreise74-21",
              "tradedoubler_id": "2205846",
              "whisky_shops": [
                {
                  "name": "Amazon Whisky",
                  "url_template": "https://www.amazon.de/s?k={keyword}&tag=whiskyreise74-21",
                  "priority": 1
                }
              ],
              "travel_links": {
                "faehre": "https://clkde.tradedoubler.com/click?p=40187&a=2205846&g=23855448",
                "flug": "https://clk.tradedoubler.com/click?p=227718&a=2205846",
                "hotel": "https://www.whisky.reise/hotels/",
                "mietwagen": "https://www.whisky.reise/mietwagen/",
                "touren": "https://www.whisky.reise/touren/",
                "versicherung": "https://www.whisky.reise/reiseversicherung/",
                "wohnmobil": "https://www.whisky.reise/wohnmobil/"
              }
            },
            "content_settings": {
              "articles_per_run": 1,
              "min_word_count": 1200,
              "max_word_count": 2500,
              "unsplash_api_key": ""
            },
            "notifications": {
              "email": "whisky-news@whisky-reise.com",
              "smtp_sender": "",
              "smtp_app_password": "",
              "enabled": False
            }
          }
          with open("config.json", "w", encoding="utf-8") as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          EOF

      - name: Artikel als Entwürfe generieren
        run: python main.py --auto -n ${{ github.event.inputs.count || '2' }}
        env:
          PYTHONIOENCODING: utf-8

      - name: Änderungen committen
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add articles/drafts/ data/
          git diff --cached --quiet || git commit -m "Auto-Generate: ${{ github.event.inputs.count || '2' }} Entwürfe erstellt [$(date +%Y-%m-%d)]"
          git push
