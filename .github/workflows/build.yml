name: Auto-Build Website

# Baut die statische Website neu wenn Artikel freigegeben werden.
# Wird ausgelöst wenn Dateien in articles/ geändert werden
# (außer articles/drafts/ und articles/rejected/).

on:
  push:
    branches: [main, master]
    paths:
      - 'articles/*.json'
      - 'data/topics_queue.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Website bauen
        run: |
          python -c "
          import json
          from site_builder_v2 import build_site
          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          # API-Keys aus Env-Vars überschreiben falls vorhanden
          import os
          if os.environ.get('OPENAI_API_KEY'):
              config['openai']['api_key'] = os.environ['OPENAI_API_KEY']
          build_site(config)
          "
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Gebaute Site committen
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add site-v2/
          git diff --cached --quiet || git commit -m "Auto-Build: Artikel veröffentlicht [skip ci]"
          git push
