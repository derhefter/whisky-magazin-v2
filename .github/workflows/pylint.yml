name: Pylint Code Quality Check

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.py'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.py'
  workflow_dispatch:

jobs:
  pylint:
    name: Run Pylint
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install pylint
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Pylint ausfuehren
        run: |
          pylint \
            --disable=C0301,C0303,W0611,R0903,C0114 \
            --output-format=colorized \
            main.py content_generator.py site_builder_v2.py
        continue-on-error: true

      - name: Pylint Score ermitteln
        run: |
          SCORE=$(pylint \
            --disable=C0301,C0303,W0611,R0903,C0114 \
            --score=yes \
            main.py content_generator.py site_builder_v2.py \
            2>&1 | grep "Your code has been rated" | awk '{print $7}' | cut -d'/' -f1)
          echo "Pylint Score: $SCORE / 10.00"
        continue-on-error: true
