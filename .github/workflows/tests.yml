name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'tests/**'
      - 'requirements.txt'

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pytest
        run: pip install pytest

      - name: Run security smoke tests
        run: python -m pytest tests/ -v
